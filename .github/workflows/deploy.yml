name: Deploy AGA MERN
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4


      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Installer et build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build


      - name: Envoyer frontend sur VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "frontend/dist/*"
          target: "/var/www/aga49/frontend"
          strip_components: 2
          rm: true


      - name: Envoyer backend sur VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "backend/*"
          target: "/var/www/aga49"
          rm: true


      - name: Installer backend et relancer PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/aga49/backend
            npm install
            
            pm2 restart aga-api || pm2 start server.js --name aga-api
            
            pm2 save
            
            nginx -t
            systemctl reload nginx